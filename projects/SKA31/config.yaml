# config.yaml - Configuration file for SKA31 project
# Only include values that differ from cozyscores/base_config.yaml.

project_name: "SKA31"

# Controls derived paths:
#   model_dir              -> ../../models/scoring/<version>
#   heatmap_dir            -> results/gradcam/scoring_<version>
#   prediction_output_dir  -> results/predictions/scoring_<version>
#   evaluation_output_dir  -> results/evaluation/scoring_<version>
scoring_model_version: "v5"

# To run the production v4 model instead, change only:
# scoring_model_version: "v4"